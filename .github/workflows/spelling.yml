name: Spelling

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.json"
      - ".github/workflows/spelling.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.json"
      - ".github/workflows/spelling.yml"

jobs:
  spelling:
    name: Spelling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run typo check
        uses: crate-ci/typos@v1.31.1
