name: Spelling

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.json"
      - ".github/workflows/spelling.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.json"
      - ".github/workflows/spelling.yml"

jobs:
  spelling:
    name: Spelling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run cspell (English + Vietnamese)
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: .cspell.json
          files: |
            **/*.md
            **/*.ts
            **/*.tsx
            **/*.js
            **/*.json
            **/*.yml
            **/*.yaml
